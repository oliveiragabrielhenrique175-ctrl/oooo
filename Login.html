<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-box">

        <h1>login</h1>

        <form id="formLogin">

            <input
                type="email"
                id="email"
                placeholder="E-mail"
                required
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        <p>
            Não possui conta?
            <a href="cadastro.html">Cadastre-se</a>
        </p>

    </div>
    <script src="login.js"></script>

</body>
</html>
